services:
  backend:
    build:
      context: ./backend
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      DATABASE_URL: sqlite:///./journal.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  backend_data:
